services:
  - type: web
    name: asuma-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g pnpm@10.11.1 && pnpm install --frozen-lockfile && pnpm --filter @dtc/backend build
    startCommand: pnpm --filter @dtc/backend start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MEDUSA_FF_CACHING
        value: "true"
      - key: MEDUSA_WORKER_MODE
        value: shared
      - key: MEDUSA_ADMIN_BACKEND_URL
        value: https://asuma-backend.onrender.com
      - key: ADMIN_CORS
        value: https://asuma-backend.onrender.com
      - key: STORE_CORS
        value: https://asuma-store.vercel.app
      - key: AUTH_CORS
        value: https://asuma-backend.onrender.com,https://asuma-store.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
